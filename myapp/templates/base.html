{% load static %}

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="author" content="suhail vs">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'bootstrap.css' %}">
  <style>
    :root {
      --ink-900: #0f172a;
      --ink-700: #334155;
      --mist-100: #f6f7f9;
      --mist-200: #eef2f3;
      --sea-600: #0f766e;
      --amber-500: #f59e0b;
      --card-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
    }

    body {
      font-family: "Manrope", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink-900);
      background: radial-gradient(circle at top right, #e2f2f1, transparent 45%),
        radial-gradient(circle at 20% 20%, #fef3c7, transparent 40%),
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
    }

    .brand-title {
      font-family: "DM Serif Display", Georgia, serif;
      letter-spacing: 0.2px;
    }

    .nav-shell {
      background: linear-gradient(120deg, #ffffff 0%, #f7fbfa 100%);
      border: 1px solid rgba(15, 118, 110, 0.15);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      padding: 14px 18px;
    }

    .nav-pill {
      background: rgba(15, 118, 110, 0.12);
      color: var(--sea-600);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .nav-link {
      color: var(--ink-700);
      font-weight: 600;
    }

    .nav-link:hover,
    .nav-link:focus {
      color: var(--sea-600);
    }

    .app-card {
      border: none;
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
    }

    .btn-primary {
      background: var(--sea-600);
      border-color: var(--sea-600);
    }

    .btn-primary:hover {
      background: #0a5f58;
      border-color: #0a5f58;
    }

    .footer-links a {
      color: var(--ink-700);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--sea-600);
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-lg-11 col-xl-10">
        <header class="mb-4">
          <div class="nav-shell d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-center gap-3">
              <div>
                <div class="brand-title h4 mb-0">Stellar Prompt Pay</div>
                <div class="text-muted small">Generate responses after a quick testnet payment.</div>
              </div>
              <span class="nav-pill">Testnet</span>
            </div>
            <nav class="d-flex align-items-center flex-wrap gap-3">
              <a href="/" class="nav-link text-decoration-none">New Prompt</a>
              <a href="https://github.com/suhailvs/stellar_hackaton2" target="_blank" rel="noopener noreferrer" class="nav-link text-decoration-none">GitHub</a>
              <a href="https://www.youtube.com/watch?v=dac5htyIEk8" target="_blank" rel="noopener noreferrer" class="nav-link text-decoration-none">Demo Video</a>
            </nav>
          </div>
        </header>
        {% block body %}  
        {% endblock %}
        <footer class="pt-4 mt-4 text-center text-muted small footer-links">
          Built for the Stellar Hackathon. Follow the project on GitHub or watch the demo video.
        </footer>
      </div>
    </div>
  </div>
  <script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
  {% block js %}
  {% endblock %}
</body>

</html>
