{% extends 'base.html' %}
{% block body %}
<div class="card app-card">
  <div class="card-body p-4 p-lg-5">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
      <div>
        <div class="text-uppercase small text-muted">Step 1</div>
        <h1 class="h3 mb-1">Describe your prompt</h1>
        <p class="text-muted mb-0">Tell the assistant exactly what you want to generate.</p>
      </div>
    </div>

    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label for="id_prompt" class="form-label fw-semibold">Prompt</label>
        <textarea id="id_prompt" minlength="10" name="prompt" rows="7" required class="form-control" 
          placeholder="Example: Explain how Stellar reaches consensus and why it scales."></textarea>
      </div>

      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div class="text-muted small">We’ll ask for a small XLM testnet payment before generating the response.</div>
        <button type="submit" class="btn btn-primary px-4">Continue</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
