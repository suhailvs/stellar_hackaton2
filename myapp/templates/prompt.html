{% extends 'base.html' %}
{% block body %}
<div class="row justify-content-center">
  <div class="col-lg-10 col-xl-9">
    <div class="card shadow-sm">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex align-items-center justify-content-between flex-wrap mb-3">
          <div>
            <h1 class="h4 mb-1">Describe Your Prompt</h1>
            <p class="text-muted mb-0">Tell the assistant what you want to generate.</p>
          </div>
          <span class="badge bg-primary-subtle text-primary mt-2 mt-sm-0">Stellar Demo</span>
        </div>

        <form method="post" novalidate>{% csrf_token %}
          <div class="mb-3">
            <label for="id_prompt" class="form-label">Prompt</label>
            <textarea id="id_prompt" name="prompt" rows="7" class="form-control" placeholder="Example: Create an offering description for local exchange trading system where I can offer activity or things like personal transportation using bike ct 100">Create an offering description for local exchange trading system where I can offer activity or things like personal transportation using bike ct 100</textarea>
            
          </div>

          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="text-muted small">We’ll ask for a small XLM payment before generating the response.</div>
            <button type="submit" class="btn btn-primary px-4">Continue</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
